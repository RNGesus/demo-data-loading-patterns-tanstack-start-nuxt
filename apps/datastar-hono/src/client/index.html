<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataStar + Hono Demo</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@sudodevnull/datastar@0.21.0/dist/datastar.min.js"></script>

    <main style="font-family: sans-serif; margin: 2rem; max-width: 32rem">
